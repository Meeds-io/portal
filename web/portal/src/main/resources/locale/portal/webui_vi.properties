UIDescription.content.pageEditWizard1=<strong>Bước 1: Thay đổi tên hiển thị, khả năng hiển thị và thời gian xuất bản của trang.</strong><br/>  Thực hiện như sau:<br/>- Chọn điều hướng từ danh sách thả dọc.<br/>- Chọn trang muốn chỉnh sửa.<br/>- Sửa đổi <em>Tên hiển thị</em> nếu được yêu cầu.<br/>- Chọn/Bỏ chọn ô <em>Hiển thị</em>.<br/>- Chọn/Bỏ chọn ô <em>Ngày Giờ Xuất bản</em>.<br/>&nbsp;&nbsp;Nếu ô <em>Ngày Giờ Xuất bản</em> được chọn, hãy:<br/>&nbsp;&nbsp;&nbsp;&nbsp;- Thay đổi <em>Thời điểm bắt đầu</em>.<br/>&nbsp;&nbsp;&nbsp;&nbsp;- Thay đổi <em>Thời điểm kết thúc</em>.<br/>- Nhấp "Tiếp tục" để chuyển sang bước tiếp theo.
UIDescription.content.pageEditWizard2=<strong>Bước 2: Sửa đổi bố cục trang.</strong><br/> Thực hiện như sau:<br/>- Chọn bố cục trang mới hoặc giữ lại bố cục hiện tại.<br/>- Nhấp "Tiếp tục" để chuyển sang bước tiếp theo hoặc "Trở lại" để quay về bước trước đó.
UIDescription.content.pageEditWizard3=<strong>Bước 2: Sửa đổi bố cục trang.</strong><br/> Thực hiện như sau:<br/>-Chọn bố cục trang mới hoặc giữ lại bố cục hiện tại.<br/>- Nhấp "Tiếp tục" để chuyển sang bước tiếp theo hoặc "Trở lại" để quay về bước trước đó.
