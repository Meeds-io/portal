UIDescription.content.pageEditWizard1=<strong>ขั้นตอนที่ 1: เปลี่ยนชื่อที่แสดง การมองเห็น และระยะเวลาการเผยแพร่ของเพจ</strong><br/> ดำเนินการดังนี้:<br/>- เลือกการนำทางจากรายการแบบเลื่อนลง <br/> - เลือกเพจที่คุณต้องการแก้ไข <br/>- แก้ไข <em>ชื่อที่แสดง</em> หากจำเป็น<br/>- เลือกหรือยกเลิกการเลือกช่องทำเครื่องหมาย <em>มองเห็นได้</em><br/>- เลือกหรือยกเลิกการเลือก <em>วันที่เผยแพร่ &amp; เวลา</em> ช่องทำเครื่องหมาย<br/>&nbsp;&nbsp;หาก <em>วันที่เผยแพร่ &amp; เวลา</em> ถูกเลือก:<br/>&nbsp;&nbsp;&nbsp;&nbsp;- เปลี่ยน <em>วันที่เริ่มตีพิมพ์</em><br/>&nbsp;&nbsp;&nbsp;&nbsp;- เปลี่ยน <em >สิ้นสุดวันที่ตีพิมพ์</em><br/>- คลิก "ถัดไป" เพื่อไปยังขั้นตอนถัดไป
UIDescription.content.pageEditWizard2=<strong>ขั้นตอนที่ 2: แก้ไขเค้าโครงหน้า</strong><br/> ดำเนินการดังต่อไปนี้:<br/>- เลือกเค้าโครงหน้าใหม่หรือคงเค้าโครงปัจจุบันไว้<br/>- คลิก "ถัดไป" เพื่อย้ายไปที่ ขั้นตอนถัดไปหรือ "ย้อนกลับ" เพื่อกลับไปยังขั้นตอนก่อนหน้า
UIDescription.content.pageEditWizard3=<strong>ขั้นตอนที่ 2: แก้ไขเค้าโครงหน้า</strong><br/> ดำเนินการดังต่อไปนี้:<br/>- เลือกเค้าโครงหน้าใหม่หรือคงเค้าโครงปัจจุบันไว้<br/>- คลิก "ถัดไป" เพื่อย้ายไปที่ ขั้นตอนถัดไปหรือ "ย้อนกลับ" เพื่อกลับไปยังขั้นตอนก่อนหน้า
