UIDescription.content.pageEditWizard2=<strong>2. lépés: Módosítsa az oldal elrendezését.</strong><br/> A következőképpen járjon el:<br/>- Válasszon új oldalelrendezést, vagy tartsa meg a jelenlegi elrendezést<br/>- Kattintson a "Tovább" gombra a következőre lépéshez a következő lépésre, vagy a "Vissza" gombra az előző lépéshez való visszatéréshez
